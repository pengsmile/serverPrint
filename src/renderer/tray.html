<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>PrintHelper - 打印服务</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      color: #333;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 20px;
      color: #333;
      margin-bottom: 4px;
    }

    .header .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: #e8f5e9;
      border-radius: 20px;
      font-size: 12px;
      color: #2e7d32;
    }

    .header .status::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #4caf50;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .info-section {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      font-size: 13px;
      color: #666;
    }

    .info-value {
      font-size: 13px;
      color: #333;
      font-weight: 500;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .printers-section {
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
    }

    .printer-list {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px;
      max-height: 120px;
      overflow-y: auto;
    }

    .printer-item {
      display: flex;
      align-items: center;
      padding: 8px;
      background: white;
      border-radius: 6px;
      margin-bottom: 6px;
    }

    .printer-item:last-child {
      margin-bottom: 0;
    }

    .printer-item .icon {
      margin-right: 8px;
      color: #667eea;
    }

    .printer-item .name {
      flex: 1;
      font-size: 13px;
      color: #333;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .printer-item .default-badge {
      font-size: 10px;
      background: #667eea;
      color: white;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5a6fd6;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #666;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .footer {
      text-align: center;
      margin-top: 16px;
      font-size: 11px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>PrintHelper</h1>
      <span class="status">服务运行中</span>
    </div>

    <div class="info-section">
      <div class="info-row">
        <span class="info-label">服务版本</span>
        <span class="info-value" id="version">1.0.0</span>
      </div>
      <div class="info-row">
        <span class="info-label">服务端口</span>
        <span class="info-value" id="port">8765</span>
      </div>
      <div class="info-row">
        <span class="info-label">默认打印机</span>
        <span class="info-value" id="defaultPrinter">-</span>
      </div>
      <!-- <div class="info-row">
        <span class="info-label">日志路径</span>
        <span class="info-value" id="logPath" style="font-size: 11px;">-</span>
      </div> -->
    </div>

    <div class="printers-section">
      <div class="section-title">可用打印机</div>
      <div class="printer-list" id="printerList">
        <div class="printer-item">
          <span class="icon">🖨</span>
          <span class="name">加载中...</span>
        </div>
      </div>
    </div>

    <div class="actions">
      <!-- <button class="btn btn-secondary" id="btnLogFolder">
        <span>📁</span> 日志文件夹
      </button> -->
      <button class="btn btn-primary" id="btnOpenLog">
        <span>📄</span> 查看日志
      </button>
    </div>

    <!-- <div class="footer">
      双击托盘图标可隐藏此窗口
    </div> -->
  </div>

  <script src="tray.js"></script>
</body>
</html>
